<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f0f4ff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #addBtn {
            background-color: #667eea;
            color: white;
        }

        #addBtn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #clearBtn {
            background-color: #e0e0e0;
            color: #333;
        }

        #clearBtn:hover {
            background-color: #d0d0d0;
            transform: translateY(-2px);
        }

        #deleteBtn {
            background-color: #ff6b6b;
            color: white;
            padding: 6px 12px;
            font-size: 0.85em;
        }

        #deleteBtn:hover {
            background-color: #ee5a52;
        }

        .search-section {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #764ba2;
        }

        .search-group {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 15px;
            align-items: flex-end;
        }

        #searchInput {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }

        #searchBtn {
            background-color: #764ba2;
            color: white;
            width: 100%;
        }

        #searchBtn:hover {
            background-color: #653a7f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        #resetSearchBtn {
            background-color: #6c757d;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 0.95em;
            grid-column: 1 / -1;
            margin-top: 10px;
        }

        #resetSearchBtn:hover {
            background-color: #5a6268;
        }

        .error {
            color: #dc3545;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .table-section {
            margin-top: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .table-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .table-info {
            color: #666;
            font-size: 0.95em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.95em;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .action-cell {
            text-align: center;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .search-group {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .table-section {
                overflow-x: auto;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }

            .form-section {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #28a745;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Student Record Management System</h1>

        <div class="success-message" id="successMessage"></div>

        <!-- Form Section -->
        <div class="form-section">
            <h3 style="color: #333; margin-bottom: 20px; font-size: 1.3em;">Add New Student</h3>
            <form id="studentForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" placeholder="Enter student name" required>
                        <div class="error" id="nameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="rollNo">Roll No:</label>
                        <input type="number" id="rollNo" placeholder="Enter roll number" required min="1">
                        <div class="error" id="rollNoError"></div>
                    </div>
                    <div class="form-group">
                        <label for="marks">Marks:</label>
                        <input type="number" id="marks" placeholder="Enter marks" required min="0" max="100">
                        <div class="error" id="marksError"></div>
                    </div>
                </div>
                <div class="button-group">
                    <button type="submit" id="addBtn">➕ Add Student</button>
                    <button type="reset" id="clearBtn">🔄 Clear Form</button>
                </div>
            </form>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h3 style="color: #333; margin-bottom: 15px; font-size: 1.2em;">Search Student</h3>
            <div class="search-group">
                <input type="text" id="searchInput" placeholder="Search by name or roll number...">
                <button id="searchBtn">🔍 Search</button>
                <button id="resetSearchBtn" style="display: none;">Reset Search</button>
            </div>
        </div>

        <!-- Statistics Section -->
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total Students</div>
                <div class="stat-value" id="totalStudents">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Average Marks</div>
                <div class="stat-value" id="averageMarks">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Highest Marks</div>
                <div class="stat-value" id="highestMarks">0</div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="table-section">
            <div class="table-header">
                <h2>Student Records</h2>
                <span class="table-info" id="recordCount">Total: 0 records</span>
            </div>
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Grade</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="no-data">
                        <td colspan="5">No students added yet. Start by adding a new student above!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Array to store student records
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let filteredStudents = null;

        // DOM Elements
        const form = document.getElementById('studentForm');
        const nameInput = document.getElementById('name');
        const rollNoInput = document.getElementById('rollNo');
        const marksInput = document.getElementById('marks');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resetSearchBtn = document.getElementById('resetSearchBtn');
        const successMessage = document.getElementById('successMessage');

        // Form submission event
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate form
            if (validateForm()) {
                addStudent();
                form.reset();
                showSuccessMessage('Student added successfully! ✅');
            }
        });

        // Form validation function
        function validateForm() {
            let isValid = true;

            // Clear previous errors
            clearErrors();

            // Name validation
            const name = nameInput.value.trim();
            if (name === '') {
                showError('nameError', 'Name is required');
                isValid = false;
            } else if (name.length < 3) {
                showError('nameError', 'Name must be at least 3 characters long');
                isValid = false;
            } else if (!/^[a-zA-Z\s]+$/.test(name)) {
                showError('nameError', 'Name can only contain letters and spaces');
                isValid = false;
            }

            // Roll No validation
            const rollNo = rollNoInput.value.trim();
            if (rollNo === '') {
                showError('rollNoError', 'Roll number is required');
                isValid = false;
            } else if (rollNo <= 0) {
                showError('rollNoError', 'Roll number must be greater than 0');
                isValid = false;
            } else if (students.some(student => student.rollNo === parseInt(rollNo) && filteredStudents === null)) {
                showError('rollNoError', 'Roll number already exists');
                isValid = false;
            } else if (!/^\d+$/.test(rollNo)) {
                showError('rollNoError', 'Roll number must be a valid number');
                isValid = false;
            }

            // Marks validation
            const marks = marksInput.value.trim();
            if (marks === '') {
                showError('marksError', 'Marks are required');
                isValid = false;
            } else if (marks < 0 || marks > 100) {
                showError('marksError', 'Marks must be between 0 and 100');
                isValid = false;
            } else if (!/^\d+(\.\d+)?$/.test(marks)) {
                showError('marksError', 'Marks must be a valid number');
                isValid = false;
            }

            return isValid;
        }

        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        // Clear all errors
        function clearErrors() {
            const errors = document.querySelectorAll('.error');
            errors.forEach(error => {
                error.classList.remove('show');
                error.textContent = '';
            });
        }

        // Add student to array
        function addStudent() {
            const student = {
                rollNo: parseInt(rollNoInput.value),
                name: nameInput.value.trim(),
                marks: parseFloat(marksInput.value)
            };

            students.push(student);
            saveToLocalStorage();
            displayTable();
            updateStatistics();
        }

        // Display students in table
        function displayTable() {
            const data = filteredStudents || students;

            if (data.length === 0) {
                tableBody.innerHTML = '<tr class="no-data"><td colspan="5">No students' + (filteredStudents ? ' found.' : ' added yet. Start by adding a new student above!') + '</td></tr>';
                document.getElementById('recordCount').textContent = 'Total: 0 records';
                return;
            }

            tableBody.innerHTML = '';

            // Sort by roll number
            data.sort((a, b) => a.rollNo - b.rollNo);

            data.forEach((student) => {
                const grade = getGrade(student.marks);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.rollNo}</td>
                    <td>${student.name}</td>
                    <td>${student.marks}</td>
                    <td><strong>${grade}</strong></td>
                    <td class="action-cell">
                        <button id="deleteBtn" onclick="deleteStudent(${student.rollNo})">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('recordCount').textContent = `Total: ${data.length} record${data.length !== 1 ? 's' : ''}`;
        }

        // Get grade based on marks
        function getGrade(marks) {
            if (marks >= 90) return 'A+';
            if (marks >= 80) return 'A';
            if (marks >= 70) return 'B';
            if (marks >= 60) return 'C';
            if (marks >= 50) return 'D';
            return 'F';
        }

        // Delete student
        function deleteStudent(rollNo) {
            if (confirm(`Are you sure you want to delete this student? This action cannot be undone.`)) {
                students = students.filter(student => student.rollNo !== rollNo);
                saveToLocalStorage();
                displayTable();
                updateStatistics();
                showSuccessMessage('Student deleted successfully! 🗑️');
                
                // Reset search if active
                if (filteredStudents !== null) {
                    resetSearch();
                }
            }
        }

        // Search functionality
        searchBtn.addEventListener('click', function() {
            const searchTerm = searchInput.value.trim().toLowerCase();

            if (searchTerm === '') {
                alert('Please enter a name or roll number to search');
                return;
            }

            filteredStudents = students.filter(student =>
                student.name.toLowerCase().includes(searchTerm) ||
                student.rollNo.toString().includes(searchTerm)
            );

            displayTable();
            resetSearchBtn.style.display = 'block';
            showSuccessMessage(`Found ${filteredStudents.length} student${filteredStudents.length !== 1 ? 's' : ''}! 🔍`);
        });

        // Reset search
        function resetSearch() {
            filteredStudents = null;
            searchInput.value = '';
            resetSearchBtn.style.display = 'none';
            displayTable();
            showSuccessMessage('Search reset! 🔄');
        }

        resetSearchBtn.addEventListener('click', resetSearch);

        // Allow search on Enter key
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        // Update statistics
        function updateStatistics() {
            const data = filteredStudents || students;

            const totalStudents = data.length;
            const averageMarks = totalStudents > 0 
                ? (data.reduce((sum, student) => sum + student.marks, 0) / totalStudents).toFixed(2)
                : 0;
            const highestMarks = totalStudents > 0 
                ? Math.max(...data.map(student => student.marks))
                : 0;

            document.getElementById('totalStudents').textContent = totalStudents;
            document.getElementById('averageMarks').textContent = averageMarks;
            document.getElementById('highestMarks').textContent = highestMarks;
        }

        // Show success message
        function showSuccessMessage(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        }

        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('students', JSON.stringify(students));
        }

        // Initial display
        displayTable();
        updateStatistics();
    </script>
</body>
</html>
